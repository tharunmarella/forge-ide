<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forge AI</title>
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Highlight.js for Code syntax highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <!-- Mermaid for diagrams -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>

    <style>
        :root {
            --bg-color: #1e1e1e;
            --panel-bg: #2b2d30;
            --border-color: #393b40;
            --text-primary: #dfe1e5;
            --text-secondary: #8c919b;
            --user-bubble: #2e4359;
            --ai-bubble: #2b2d30;
            --input-bg: #3c3f41;
            --tool-bg: #1e1f22;
            --accent: #3574f0;
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --font-mono: "JetBrains Mono", Consolas, Menlo, Monaco, monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            font-size: 13px;
            line-height: 1.5;
        }

        #chat-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #4a4d51;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #5c5f63;
        }

        /* Message Bubbles */
        .message {
            display: flex;
            flex-direction: column;
            max-width: 95%;
            animation: fadeIn 0.3s ease-out;
        }
        
        .message.user {
            align-self: flex-end;
            align-items: flex-end;
        }
        
        .message.ai {
            align-self: flex-start;
            align-items: flex-start;
        }

        .bubble {
            padding: 12px 16px;
            border-radius: 8px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .user .bubble {
            background-color: var(--user-bubble);
            border-bottom-right-radius: 2px;
        }

        .ai .bubble {
            background-color: var(--ai-bubble);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 2px;
            width: 100%;
        }

        .sender-name {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Markdown Styling inside Bubbles */
        .bubble-content {
            word-wrap: break-word;
        }
        
        .bubble-content p {
            margin-bottom: 8px;
        }
        .bubble-content p:last-child {
            margin-bottom: 0;
        }
        
        .bubble-content h1, .bubble-content h2, .bubble-content h3, .bubble-content h4 {
            margin: 12px 0 8px 0;
            font-weight: 600;
            color: #fff;
        }
        .bubble-content h3 { font-size: 14px; }
        
        .bubble-content ul, .bubble-content ol {
            margin-bottom: 8px;
            padding-left: 20px;
        }
        
        .bubble-content li {
            margin-bottom: 4px;
        }

        .bubble-content strong {
            color: #fff;
            font-weight: 600;
        }

        .bubble-content a {
            color: #548af7;
            text-decoration: none;
        }
        .bubble-content a:hover {
            text-decoration: underline;
        }

        /* Inline code */
        .bubble-content code:not(pre code) {
            background-color: rgba(255, 255, 255, 0.1);
            padding: 2px 4px;
            border-radius: 4px;
            font-family: var(--font-mono);
            font-size: 12px;
            color: #c98270;
        }

        /* Code Blocks */
        .bubble-content pre {
            background-color: #1e1e1e !important;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 12px;
            margin: 12px 0;
            overflow-x: auto;
        }
        .bubble-content pre code {
            font-family: var(--font-mono);
            font-size: 12px;
            line-height: 1.4;
            background: transparent !important;
        }

        /* Tool Execution Blocks */
        .tool-block {
            background-color: var(--tool-bg);
            border-left: 2px solid var(--accent);
            border-radius: 4px;
            padding: 8px 12px;
            margin: 8px 0;
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text-secondary);
        }
        .tool-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .tool-name {
            color: #548af7;
        }
        .tool-status {
            color: #6a8759;
        }
        .tool-status.failed {
            color: #ff6b68;
        }
        
        /* Thinking Block */
        .thinking-block {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            font-style: italic;
            font-size: 12px;
            margin-bottom: 8px;
        }
        .spinner {
            width: 12px;
            height: 12px;
            border: 2px solid var(--text-secondary);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Input Area */
        #input-container {
            padding: 12px 16px;
            background-color: var(--panel-bg);
            border-top: 1px solid var(--border-color);
        }
        
        .input-wrapper {
            display: flex;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            overflow: hidden;
        }
        .input-wrapper:focus-within {
            border-color: var(--accent);
        }

        #user-input {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            padding: 12px;
            font-family: var(--font-main);
            font-size: 13px;
            resize: none;
            outline: none;
        }

        #send-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 0 12px;
            cursor: pointer;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #send-btn:hover {
            color: var(--accent);
        }
        #send-btn svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        /* Login Screen */
        #login-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 20px;
            text-align: center;
        }
        #login-screen h1 {
            font-size: 24px;
            margin-bottom: 8px;
            color: #fff;
        }
        #login-screen p {
            color: var(--text-secondary);
            margin-bottom: 30px;
        }
        .auth-btn {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 12px;
            width: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background 0.2s;
        }
        .auth-btn:hover {
            background-color: #393b40;
        }
    </style>
</head>
<body>

    <!-- Login Screen -->
    <div id="login-screen">
        <h1>Forge AI</h1>
        <p id="login-status">Sign in to continue</p>
        <button class="auth-btn" onclick="startAuth('github')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
            Sign in with GitHub
        </button>
        <button class="auth-btn" onclick="startAuth('google')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            Sign in with Google
        </button>
    </div>

    <!-- Main Chat Interface -->
    <div id="main-interface" style="display: none; height: 100%; flex-direction: column;">
        <div id="chat-container">
            <div class="message ai">
                <div class="sender-name">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="var(--accent)"><path d="M21 10.5h-1.5v-3c0-1.65-1.35-3-3-3h-3v-1.5c0-.825-.675-1.5-1.5-1.5s-1.5.675-1.5 1.5v1.5h-3c-1.65 0-3 1.35-3 3v3H3c-.825 0-1.5.675-1.5 1.5s.675 1.5 1.5 1.5h1.5v3c0 1.65 1.35 3 3 3h3v1.5c0 .825.675 1.5 1.5 1.5s1.5-.675 1.5-1.5v-1.5h3c1.65 0 3-1.35 3-3v-3h1.5c.825 0 1.5-.675 1.5-1.5s-.675-1.5-1.5-1.5zm-4.5 6c0 .825-.675 1.5-1.5 1.5h-6c-.825 0-1.5-.675-1.5-1.5v-6c0-.825.675-1.5 1.5-1.5h6c.825 0 1.5.675 1.5 1.5v6zM9 12h1.5v1.5H9V12zm4.5 0H15v1.5h-1.5V12z"/></svg>
                    Forge AI
                </div>
                <div class="bubble">
                    <div class="bubble-content">Ready. How can I help you today?</div>
                </div>
            </div>
        </div>
        
        <div id="input-container">
            <div class="input-wrapper">
                <input type="text" id="user-input" placeholder="Ask Forge AI..." autocomplete="off" />
                <button id="send-btn" onclick="sendMessage()">
                    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        // Configure Marked.js with Highlight.js
        marked.setOptions({
            highlight: function(code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    try {
                        return hljs.highlight(code, { language: lang }).value;
                    } catch (__) {}
                }
                return hljs.highlightAuto(code).value;
            },
            breaks: true // convert \n to <br>
        });

        mermaid.initialize({ startOnLoad: false, theme: 'dark' });

        const chatContainer = document.getElementById('chat-container');
        let currentAiMessageDiv = null;
        let currentAiContentDiv = null;
        let rawMarkdown = "";
        let currentThinkingBlock = null;
        let currentToolBlock = null;

        function showAuthScreen(show, statusText = "Sign in to continue") {
            document.getElementById('login-screen').style.display = show ? 'flex' : 'none';
            document.getElementById('main-interface').style.display = show ? 'none' : 'flex';
            if (show) {
                document.getElementById('login-status').innerText = statusText;
            }
        }

        function startAuth(provider) {
            if (window.sendActionToKotlin) {
                window.sendActionToKotlin(JSON.stringify({ action: "auth", provider: provider }));
            }
        }

        window.receiveMessageFromKotlin = function(jsonStr) {
            try {
                const event = JSON.parse(jsonStr);

                if (event.type === "auth_status") {
                    showAuthScreen(event.show_login, event.message);
                    return;
                }

                switch (event.type) {
                    case 'text_delta':
                        if (!currentAiMessageDiv) createAiMessageBlock();
                        rawMarkdown += event.content;
                        // Debounce markdown rendering for performance could be added here
                        currentAiContentDiv.innerHTML = marked.parse(rawMarkdown);
                        break;

                    case 'thinking':
                        if (event.stepType === 'start') {
                            if (!currentAiMessageDiv) createAiMessageBlock();
                            currentThinkingBlock = document.createElement('div');
                            currentThinkingBlock.className = 'thinking-block';
                            currentThinkingBlock.innerHTML = '<div class="spinner"></div> Thinking...';
                            
                            // Insert before the markdown content
                            currentAiMessageDiv.querySelector('.bubble').insertBefore(
                                currentThinkingBlock, currentAiContentDiv
                            );
                        } else if (event.stepType === 'end' && currentThinkingBlock) {
                            currentThinkingBlock.remove();
                            currentThinkingBlock = null;
                        }
                        break;

                    case 'tool_start':
                        if (!currentAiMessageDiv) createAiMessageBlock();
                        
                        currentToolBlock = document.createElement('div');
                        currentToolBlock.className = 'tool-block';
                        
                        const inputStr = event.input || "{}";
                        currentToolBlock.innerHTML = `
                            <div class="tool-header">
                                <span>🛠 <span class="tool-name">${event.name}</span>(...)</span>
                                <span class="tool-status">Running...</span>
                            </div>
                        `;
                        
                        currentAiMessageDiv.querySelector('.bubble').insertBefore(
                            currentToolBlock, currentAiContentDiv
                        );
                        break;

                    case 'tool_end':
                        if (currentToolBlock) {
                            const statusSpan = currentToolBlock.querySelector('.tool-status');
                            if (event.success) {
                                statusSpan.textContent = '✓ Done';
                            } else {
                                statusSpan.textContent = '✗ Failed';
                                statusSpan.className = 'tool-status failed';
                            }
                            currentToolBlock = null;
                        }
                        break;

                    case 'error':
                        if (!currentAiMessageDiv) createAiMessageBlock();
                        const errDiv = document.createElement('div');
                        errDiv.style.color = 'var(--error)';
                        errDiv.style.fontWeight = 'bold';
                        errDiv.style.marginTop = '8px';
                        errDiv.textContent = 'Error: ' + event.message;
                        currentAiContentDiv.appendChild(errDiv);
                        break;

                    case 'show_diagram':
                        if (!currentAiMessageDiv) createAiMessageBlock();
                        const id = 'mermaid-' + Date.now();
                        const diagramDiv = document.createElement('div');
                        diagramDiv.className = 'diagram-container';
                        diagramDiv.style.margin = '16px 0';
                        diagramDiv.style.padding = '16px';
                        diagramDiv.style.backgroundColor = '#1e1e1e';
                        diagramDiv.style.borderRadius = '6px';
                        
                        if (event.title) {
                            diagramDiv.innerHTML = `<h4 style="margin-top:0;">${event.title}</h4><div class="mermaid" id="${id}">${event.code}</div>`;
                        } else {
                            diagramDiv.innerHTML = `<div class="mermaid" id="${id}">${event.code}</div>`;
                        }
                        currentAiContentDiv.appendChild(diagramDiv);
                        
                        try {
                            mermaid.init(undefined, document.getElementById(id));
                        } catch (e) {
                            document.getElementById(id).innerHTML = `<pre><code>${event.code}</code></pre>`;
                        }
                        break;

                    case 'show_code':
                        if (!currentAiMessageDiv) createAiMessageBlock();
                        const codeBlock = document.createElement('div');
                        codeBlock.innerHTML = marked.parse("```" + event.language + "\n" + event.code + "\n```");
                        currentAiContentDiv.appendChild(codeBlock);
                        break;

                    case 'done':
                        // Finalize block
                        currentAiMessageDiv = null;
                        currentAiContentDiv = null;
                        break;
                }
                
                scrollToBottom();
            } catch (e) {
                console.error("Failed to parse message from Kotlin", e, jsonStr);
            }
        };

        function createAiMessageBlock() {
            currentAiMessageDiv = document.createElement('div');
            currentAiMessageDiv.className = 'message ai';
            
            currentAiMessageDiv.innerHTML = `
                <div class="sender-name">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="var(--accent)"><path d="M21 10.5h-1.5v-3c0-1.65-1.35-3-3-3h-3v-1.5c0-.825-.675-1.5-1.5-1.5s-1.5.675-1.5 1.5v1.5h-3c-1.65 0-3 1.35-3 3v3H3c-.825 0-1.5.675-1.5 1.5s.675 1.5 1.5 1.5h1.5v3c0 1.65 1.35 3 3 3h3v1.5c0 .825.675 1.5 1.5 1.5s1.5-.675 1.5-1.5v-1.5h3c1.65 0 3-1.35 3-3v-3h1.5c.825 0 1.5-.675 1.5-1.5s-.675-1.5-1.5-1.5zm-4.5 6c0 .825-.675 1.5-1.5 1.5h-6c-.825 0-1.5-.675-1.5-1.5v-6c0-.825.675-1.5 1.5-1.5h6c.825 0 1.5.675 1.5 1.5v6zM9 12h1.5v1.5H9V12zm4.5 0H15v1.5h-1.5V12z"/></svg>
                    Forge AI
                </div>
                <div class="bubble">
                    <div class="bubble-content markdown-body"></div>
                </div>
            `;
            
            chatContainer.appendChild(currentAiMessageDiv);
            currentAiContentDiv = currentAiMessageDiv.querySelector('.bubble-content');
            rawMarkdown = "";
        }

        function appendUserMessage(text) {
            const div = document.createElement('div');
            div.className = 'message user';
            div.innerHTML = `
                <div class="sender-name">You</div>
                <div class="bubble">
                    <div class="bubble-content">${text.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</div>
                </div>
            `;
            chatContainer.appendChild(div);
            scrollToBottom();
        }

        function sendMessage() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            
            if(text !== '') {
                appendUserMessage(text);
                input.value = '';
                
                // Reset AI tracking
                currentAiMessageDiv = null;
                currentAiContentDiv = null;
                rawMarkdown = "";
                
                if (window.sendActionToKotlin) {
                    window.sendActionToKotlin(JSON.stringify({ action: "chat", text: text }));
                }
            }
        }
        
        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        
        document.getElementById("user-input").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
