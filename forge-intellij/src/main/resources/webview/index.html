<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forge AI</title>
    <link rel="stylesheet" href="vendor/github-dark.min.css">
    <script src="vendor/marked.min.js"></script>
    <script src="vendor/highlight.min.js"></script>
    <script src="vendor/mermaid.min.js"></script>
    <style>
        /* shadcn/ui dark theme design tokens */
        :root {
            --background:        #09090b;
            --foreground:        #fafafa;
            --card:              #09090b;
            --card-foreground:   #fafafa;
            --muted:             #27272a;
            --muted-foreground:  #a1a1aa;
            --border:            #27272a;
            --input:             #27272a;
            --primary:           #fafafa;
            --primary-foreground:#09090b;
            --secondary:         #27272a;
            --secondary-foreground: #fafafa;
            --accent:            #27272a;
            --accent-foreground: #fafafa;
            --destructive:       #7f1d1d;
            --destructive-fg:    #fca5a5;
            --ring:              #d4d4d8;
            --blue:              #3b82f6;
            --green:             #22c55e;
            --radius:            6px;
            --font-sans: ui-sans-serif, system-ui, -apple-system, sans-serif;
            --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            font-family: var(--font-sans);
            font-size: 13px;
            line-height: 1.5;
            background: var(--background);
            color: var(--foreground);
            -webkit-font-smoothing: antialiased;
        }

        body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* ── Scrollbar ─────────────────────────────────────────── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #52525b; }

        /* ── Chat list ─────────────────────────────────────────── */
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px 8px;
            display: flex;
            flex-direction: column;
            gap: 0;          /* no gap — messages control their own spacing */
        }

        /* ── Message row ───────────────────────────────────────── */
        .msg {
            display: flex;
            flex-direction: column;
            padding: 4px 0;
        }

        /* Hide "Forge AI" label when it immediately follows another AI block */
        .msg.ai + .msg.ai > .msg-label { display: none; }

        .msg-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.03em;
            color: var(--muted-foreground);
            margin-bottom: 3px;
            text-transform: uppercase;
        }
        .msg.user .msg-label { color: var(--blue); }

        .msg-body {
            color: var(--foreground);
            font-size: 13px;
            line-height: 1.6;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        /* ── User messages ─────────────────────────────────────── */
        .msg.user { margin: 6px 0; }
        .msg.user .msg-body {
            background: var(--muted);
            border-radius: var(--radius);
            padding: 8px 10px;
            display: inline-block;
            max-width: 90%;
        }

        /* ── Markdown ──────────────────────────────────────────── */
        .msg-body p { margin-bottom: 6px; }
        .msg-body p:last-child { margin-bottom: 0; }
        .msg-body h1, .msg-body h2, .msg-body h3, .msg-body h4 {
            font-weight: 600; color: var(--foreground);
            margin: 12px 0 4px;
            line-height: 1.3;
        }
        .msg-body h1 { font-size: 17px; }
        .msg-body h2 { font-size: 15px; }
        .msg-body h3, .msg-body h4 { font-size: 13px; }
        .msg-body ul, .msg-body ol { padding-left: 18px; margin-bottom: 6px; }
        .msg-body li { margin-bottom: 2px; }
        .msg-body strong { font-weight: 600; color: var(--foreground); }
        .msg-body a { color: var(--blue); text-decoration: none; }
        .msg-body a:hover { text-decoration: underline; }
        .msg-body blockquote {
            border-left: 3px solid var(--border);
            padding-left: 10px;
            margin: 6px 0;
            color: var(--muted-foreground);
        }
        .msg-body code:not(pre code) {
            background: var(--muted);
            padding: 1px 4px;
            border-radius: 3px;
            font-family: var(--font-mono);
            font-size: 11.5px;
            color: #f97316;
        }
        .msg-body pre {
            background: #18181b !important;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 10px 12px;
            margin: 6px 0;
            overflow-x: auto;
        }
        .msg-body pre code {
            font-family: var(--font-mono);
            font-size: 11.5px;
            line-height: 1.5;
            background: transparent !important;
            color: #e4e4e7;
        }
        .msg-body table {
            border-collapse: collapse;
            width: 100%;
            margin: 6px 0;
            font-size: 12px;
        }
        .msg-body th, .msg-body td {
            border: 1px solid var(--border);
            padding: 4px 8px;
            text-align: left;
        }
        .msg-body th { background: var(--muted); font-weight: 600; }

        /* ── Tool call badges (compact inline row) ─────────────── */
        .tool-list {
            display: flex;
            flex-direction: column;
            gap: 2px;
            margin: 2px 0;
        }
        .tool-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 3px 8px;
            border-radius: 4px;
            background: var(--muted);
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--muted-foreground);
            width: fit-content;
            max-width: 100%;
        }
        .tool-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
            background: var(--blue);
        }
        .tool-dot.done  { background: var(--green); }
        .tool-dot.err   { background: var(--destructive-fg); }
        .tool-dot.spin  {
            background: transparent;
            border: 1.5px solid var(--muted-foreground);
            border-top-color: var(--blue);
            animation: spin 0.7s linear infinite;
        }
        .tool-name { color: #fbbf24; font-weight: 500; }
        .tool-status { color: var(--muted-foreground); font-size: 10px; }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Thinking indicator ────────────────────────────────── */
        .thinking {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 2px 0;
            font-size: 12px;
            color: var(--muted-foreground);
            font-style: italic;
        }
        .thinking-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: transparent;
            border: 1.5px solid var(--muted-foreground);
            border-top-color: var(--blue);
            animation: spin 0.7s linear infinite;
            flex-shrink: 0;
        }

        /* ── Error ─────────────────────────────────────────────── */
        .error-line {
            color: var(--destructive-fg);
            font-size: 12px;
            padding: 4px 8px;
            background: rgba(127,29,29,0.2);
            border-radius: var(--radius);
            border-left: 2px solid var(--destructive-fg);
            margin: 2px 0;
        }

        /* ── Diagram ───────────────────────────────────────────── */
        .diagram-wrap {
            margin: 6px 0;
            padding: 12px;
            background: #18181b;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow-x: auto;
        }
        .diagram-title {
            font-size: 12px; font-weight: 600;
            color: var(--muted-foreground);
            margin-bottom: 8px;
        }

        /* ── Input bar ─────────────────────────────────────────── */
        #input-bar {
            border-top: 1px solid var(--border);
            background: var(--background);
            padding: 8px 12px;
            display: flex;
            align-items: flex-end;
            gap: 6px;
        }
        #user-input {
            flex: 1;
            background: var(--muted);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--foreground);
            font-family: var(--font-sans);
            font-size: 13px;
            padding: 7px 10px;
            resize: none;
            outline: none;
            min-height: 36px;
            max-height: 160px;
            overflow-y: auto;
            line-height: 1.5;
            transition: border-color 0.15s;
        }
        #user-input:focus { border-color: var(--ring); }
        #user-input::placeholder { color: var(--muted-foreground); }
        .icon-btn {
            background: transparent;
            border: none;
            color: var(--muted-foreground);
            width: 32px; height: 32px;
            border-radius: var(--radius);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            transition: background 0.1s, color 0.1s;
        }
        .icon-btn:hover { background: var(--muted); color: var(--foreground); }
        .icon-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .icon-btn svg { width: 15px; height: 15px; fill: currentColor; }
        #stop-btn { color: var(--destructive-fg); display: none; }
        #stop-btn:hover { background: rgba(127,29,29,0.3); }

        /* ── Login screen ──────────────────────────────────────── */
        #login {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 12px;
            padding: 32px;
            text-align: center;
        }
        .login-logo {
            width: 40px; height: 40px;
            background: var(--muted);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 4px;
        }
        .login-logo svg { width: 22px; height: 22px; fill: var(--blue); }
        #login h2 { font-size: 16px; font-weight: 600; }
        #login p { font-size: 12px; color: var(--muted-foreground); max-width: 220px; }
        #login-status {
            font-size: 12px;
            color: var(--muted-foreground);
            min-height: 16px;
        }
        .gh-btn {
            display: flex; align-items: center; gap: 8px;
            background: var(--foreground);
            color: var(--primary-foreground);
            border: none;
            border-radius: var(--radius);
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.15s;
            font-family: var(--font-sans);
        }
        .gh-btn:hover { opacity: 0.9; }
        .gh-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .gh-btn svg { width: 16px; height: 16px; fill: currentColor; flex-shrink: 0; }
    </style>
</head>
<body>

<!-- ── Login ──────────────────────────────────────────────────────── -->
<div id="login">
    <div class="login-logo">
        <svg viewBox="0 0 24 24"><path d="M13 2L4.09 12.97 9.5 12.5 7 22l10.91-10.97L12.5 11.5z"/></svg>
    </div>
    <h2>Forge AI</h2>
    <p>Sign in to get AI-powered code intelligence and chat.</p>
    <button class="gh-btn" id="gh-btn" onclick="startAuth()">
        <svg viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
        Sign in with GitHub
    </button>
    <span id="login-status"></span>
</div>

<!-- ── Main ───────────────────────────────────────────────────────── -->
<div id="main" style="display:none; flex-direction:column; height:100%; overflow:hidden;">
    <div id="chat">
        <div class="msg ai">
            <div class="msg-label">Forge AI</div>
            <div class="msg-body">Ready. How can I help you today?</div>
        </div>
    </div>
    <div id="input-bar">
        <textarea id="user-input" rows="1" placeholder="Message Forge AI…  (Shift+Enter for new line)"></textarea>
        <button id="stop-btn" class="icon-btn" title="Stop" onclick="stopGeneration()">
            <svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
        </button>
        <button id="send-btn" class="icon-btn" title="Send  (Enter)" onclick="sendMessage()">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>
</div>

<script>
// ── Setup ────────────────────────────────────────────────────────────
marked.setOptions({
    highlight(code, lang) {
        if (lang && hljs.getLanguage(lang)) {
            try { return hljs.highlight(code, { language: lang }).value; } catch(_) {}
        }
        return hljs.highlightAuto(code).value;
    },
    breaks: true, gfm: true,
});
mermaid.initialize({ startOnLoad: false, theme: 'dark', securityLevel: 'loose' });

// ── State ────────────────────────────────────────────────────────────
const chat        = document.getElementById('chat');
let curMsgDiv     = null;   // current AI .msg element
let curBodyDiv    = null;   // current .msg-body inside it
let curToolList   = null;   // .tool-list container inside curMsgDiv
let rawMd         = '';
let rafId         = null;
let thinkEl       = null;
let toolEls       = {};     // tool_call_id → .tool-item element
let isWaiting     = false;

// ── Theme injection ──────────────────────────────────────────────────
window.applyTheme = (vars) => {
    for (const [k, v] of Object.entries(vars)) {
        document.documentElement.style.setProperty('--' + k, v);
    }
};

// ── Auth ─────────────────────────────────────────────────────────────
function showLogin(show, msg) {
    document.getElementById('login').style.display = show ? 'flex' : 'none';
    document.getElementById('main').style.display  = show ? 'none' : 'flex';
    if (msg) {
        const el = document.getElementById('login-status');
        el.textContent = msg;
        el.style.color = /error|expired|fail/i.test(msg) ? 'var(--destructive-fg)' : 'var(--muted-foreground)';
    }
    if (show) resetGhBtn();
}
function resetGhBtn() {
    const b = document.getElementById('gh-btn');
    b.disabled = false;
    b.textContent = '';
    b.innerHTML = '<svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:currentColor;flex-shrink:0"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>Sign in with GitHub';
}
function startAuth() {
    const b = document.getElementById('gh-btn');
    b.disabled = true;
    b.textContent = 'Opening browser…';
    document.getElementById('login-status').textContent = 'Complete sign-in in your browser, then return here.';
    window.sendActionToKotlin?.(JSON.stringify({ action: 'auth', provider: 'github' }));
}

// ── Waiting state ────────────────────────────────────────────────────
function setWaiting(w) {
    isWaiting = w;
    document.getElementById('send-btn').style.display = w ? 'none' : 'flex';
    document.getElementById('stop-btn').style.display = w ? 'flex' : 'none';
    document.getElementById('user-input').disabled = w;
}
function stopGeneration() {
    window.sendActionToKotlin?.(JSON.stringify({ action: 'stop' }));
    setWaiting(false);
}

// ── Markdown debounce ────────────────────────────────────────────────
function schedMd() {
    if (!rafId) rafId = requestAnimationFrame(flushMd);
}
function flushMd() {
    rafId = null;
    if (curBodyDiv && rawMd) curBodyDiv.innerHTML = marked.parse(rawMd);
}

// ── AI message block ─────────────────────────────────────────────────
// Creates a new .msg.ai block. Tool calls go before .msg-body.
function ensureAiMsg() {
    if (curMsgDiv) return;
    curMsgDiv = document.createElement('div');
    curMsgDiv.className = 'msg ai';

    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = 'Forge AI';

    curBodyDiv = document.createElement('div');
    curBodyDiv.className = 'msg-body';

    curMsgDiv.appendChild(label);
    curMsgDiv.appendChild(curBodyDiv);
    chat.appendChild(curMsgDiv);
    curToolList = null;
    rawMd = '';
}

function getToolList() {
    if (!curToolList) {
        if (!curMsgDiv) ensureAiMsg();
        curToolList = document.createElement('div');
        curToolList.className = 'tool-list';
        // Insert tool list before the .msg-body
        curMsgDiv.insertBefore(curToolList, curBodyDiv);
    }
    return curToolList;
}

// ── Message receiver ─────────────────────────────────────────────────
window.receiveMessageFromKotlin = (jsonStr) => {
    try {
        const ev = JSON.parse(jsonStr);

        if (ev.type === 'auth_status') {
            showLogin(ev.show_login, ev.message);
            return;
        }

        switch (ev.type) {

        case 'text_delta':
            ensureAiMsg();
            rawMd += ev.content || '';
            schedMd();
            break;

        case 'thinking_start':
            ensureAiMsg();
            if (!thinkEl) {
                thinkEl = document.createElement('div');
                thinkEl.className = 'thinking';
                thinkEl.innerHTML = '<div class="thinking-dot"></div><span>Thinking…</span>';
                curMsgDiv.insertBefore(thinkEl, curBodyDiv);
            }
            break;

        case 'thinking_delta':
            if (thinkEl) {
                const span = thinkEl.querySelector('span');
                if (span && ev.content) span.textContent = ev.content.slice(0, 80) + (ev.content.length > 80 ? '…' : '');
            }
            break;

        case 'thinking_end':
            thinkEl?.remove(); thinkEl = null;
            break;

        case 'tool_start': {
            ensureAiMsg();
            const tl = getToolList();
            const item = document.createElement('div');
            item.className = 'tool-item';
            item.innerHTML = `<div class="tool-dot spin"></div><span class="tool-name">${esc(ev.name || '')}</span><span class="tool-status">running</span>`;
            tl.appendChild(item);
            if (ev.id) toolEls[ev.id] = item;
            break;
        }

        case 'tool_end': {
            const item = toolEls[ev.id] || Object.values(toolEls).pop();
            if (item) {
                const dot    = item.querySelector('.tool-dot');
                const status = item.querySelector('.tool-status');
                const ok = ev.success !== false;
                dot.className    = 'tool-dot ' + (ok ? 'done' : 'err');
                status.textContent = ok ? 'done' : 'failed';
                if (ev.id) delete toolEls[ev.id];
            }
            break;
        }

        case 'error': {
            ensureAiMsg();
            const e = document.createElement('div');
            e.className = 'error-line';
            e.textContent = ev.message || 'Unknown error';
            curMsgDiv.insertBefore(e, curBodyDiv);
            setWaiting(false);
            break;
        }

        case 'show_diagram': {
            ensureAiMsg();
            const wrap = document.createElement('div');
            wrap.className = 'diagram-wrap';
            if (ev.title) {
                const t = document.createElement('div');
                t.className = 'diagram-title';
                t.textContent = ev.title;
                wrap.appendChild(t);
            }
            const id = 'mermaid-' + Date.now();
            const mEl = document.createElement('div');
            mEl.className = 'mermaid'; mEl.id = id;
            mEl.textContent = ev.code || '';
            wrap.appendChild(mEl);
            curBodyDiv.appendChild(wrap);
            requestAnimationFrame(() => {
                try { mermaid.init(undefined, document.getElementById(id)); }
                catch(_) {
                    const el = document.getElementById(id);
                    if (el) { const pre = document.createElement('pre'); pre.textContent = ev.code || ''; el.replaceWith(pre); }
                }
            });
            break;
        }

        case 'show_code': {
            ensureAiMsg();
            const lang = (ev.language || '').replace(/[^a-z0-9]/gi, '');
            const w = document.createElement('div');
            w.innerHTML = marked.parse('```' + lang + '\n' + (ev.code || '') + '\n```');
            curBodyDiv.appendChild(w);
            break;
        }

        case 'done':
            flushMd();
            thinkEl?.remove(); thinkEl = null;
            // Mark any still-spinning tool dots as done
            for (const [id, item] of Object.entries(toolEls)) {
                const dot = item.querySelector('.tool-dot');
                const st  = item.querySelector('.tool-status');
                if (dot?.classList.contains('spin')) { dot.className = 'tool-dot done'; st.textContent = 'done'; }
                delete toolEls[id];
            }
            // Don't reset curMsgDiv — let next AI response continue in same block
            // (adjacent .msg.ai + .msg.ai hides duplicate label via CSS)
            curMsgDiv = null; curBodyDiv = null; curToolList = null;
            setWaiting(false);
            break;
        }

        scrollBottom();
    } catch(e) {
        console.error('receiveMessageFromKotlin parse error', e);
    }
};

// ── Helpers ──────────────────────────────────────────────────────────
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function scrollBottom() { chat.scrollTop = chat.scrollHeight; }

function appendUser(text) {
    const div = document.createElement('div');
    div.className = 'msg user';
    div.innerHTML = '<div class="msg-label">You</div><div class="msg-body"></div>';
    const body = div.querySelector('.msg-body');
    text.split('\n').forEach((line, i, arr) => {
        body.appendChild(document.createTextNode(line));
        if (i < arr.length - 1) body.appendChild(document.createElement('br'));
    });
    chat.appendChild(div);
    scrollBottom();
}

function sendMessage() {
    if (isWaiting) return;
    const inp = document.getElementById('user-input');
    const text = inp.value.trim();
    if (!text) return;
    appendUser(text);
    inp.value = ''; autoGrow(inp);
    curMsgDiv = null; curBodyDiv = null; curToolList = null; rawMd = '';
    setWaiting(true);
    window.sendActionToKotlin?.(JSON.stringify({ action: 'chat', text }));
}

// ── Textarea auto-grow ───────────────────────────────────────────────
function autoGrow(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}
const inp = document.getElementById('user-input');
inp.addEventListener('input', () => autoGrow(inp));
inp.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
</script>
</body>
